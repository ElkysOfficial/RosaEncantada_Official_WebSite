    <style>

        --rosa-claro: #fdeef2;
        --rosa-suave: #fbd5dd;

        --ease: cubic-bezier(0.22, 1, 0.36, 1);

      [data-theme="dark"] {

        --rosa-suave: #3a2429;
        --rosa-medio: #4a2c33;
        --choco: #fff7f3;
        --creme: #161013;
        --cinza-500: #a99499;
        --cinza-700: #e9dde0;

      html { color-scheme: light; }
      html[data-theme="dark"] { color-scheme: dark; }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
        background: linear-gradient(180deg, var(--rosa-claro) 0%, var(--creme) 100%);
        color: var(--cinza-700);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem 1.5rem;
        overflow: hidden;
        position: relative;
        line-height: 1.7;
      }
      body::before,
      body::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.55;
        pointer-events: none;
        animation: float 18s ease-in-out infinite;
      }
      body::before {
        width: 380px;
        height: 380px;
        background: var(--rosa-medio);
        top: -100px;
        left: -80px;
      }
      body::after {
        width: 460px;
        height: 460px;

        bottom: -140px;
        right: -120px;
        animation-delay: -7s;

      @keyframes float {

  <body>
    <canvas id="chocoCanvas" aria-hidden="true"></canvas>

    <main class="wrap">
      <noscript>

      <span class="eyebrow">Ops, doce engano</span>
      <h1>Essa página <em>derreteu no caminho</em>.</h1>

    </main>

    <script>
      /* Cascata de chocolate premium: lip no topo derramando + ribbons
         contínuas de fundo + streams formando '404' + shimmer de brilho */
      (function () {
        const canvas = document.getElementById('chocoCanvas');
        if (!canvas || !canvas.getContext) return;
        const ctx = canvas.getContext('2d');
        const dpr = Math.min(window.devicePixelRatio || 1, 2);

        let W = 0, H = 0;
        let cascadeBottom = 0;        /* y onde a cascata começa a desaparecer */
        let lipY = 0;                 /* altura do lip de chocolate no topo */
        let targets = [];
        let streams = [];
        let settled = [];
        let ribbons = [];
        let drips = [];               /* drips do lip que pingam constantemente */
        let shimmers = [];
        let targetIndex = 0;
        let lastSpawn = 0;
        let restartTimer = null;
        let t0 = 0;

        function colors() {
          const dark = document.documentElement.getAttribute('data-theme') === 'dark';
          return dark
            ? {
                deep:    '#2a1208',
                mid:     '#5a2818',
                light:   '#9b5a3f',
                shine:   '#d18c66',
                pool:    '#7a3a26',
              }
            : {
                deep:    '#1f0c05',
                mid:     '#3d1c12',
                light:   '#6b3525',
                shine:   '#a86a45',
                pool:    '#4a2418',
              };
        }

        function hexA(hex, alpha) {
          const v = parseInt(hex.slice(1), 16);
          return 'rgba(' + (v >> 16 & 255) + ',' + (v >> 8 & 255) + ',' + (v & 255) + ',' + alpha + ')';
        }

        function resize() {
          W = window.innerWidth;
          H = window.innerHeight;
          canvas.width = W * dpr;
          canvas.height = H * dpr;
          canvas.style.width = W + 'px';
          canvas.style.height = H + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          cascadeBottom = Math.min(H * 0.58, 480);
          lipY = Math.max(36, Math.min(64, H * 0.06));
          computeTargets();
          buildRibbons();
          buildShimmers();
          streams = [];
          settled = [];
          drips = [];
          targetIndex = 0;
        }

        function computeTargets() {
          targets = [];
          const fontSize = Math.min(W * 0.32, H * 0.45, 320);
          const centerY = Math.min(H * 0.32, 240);

          const off = document.createElement('canvas');
          off.width = W;
          off.height = H;
          const octx = off.getContext('2d');
          octx.fillStyle = '#000';
          octx.font = '700 ' + fontSize + 'px "Playfair Display", Georgia, serif';
          octx.textAlign = 'center';
          octx.textBaseline = 'middle';
          octx.fillText('404', W / 2, centerY);

          const data = octx.getImageData(0, 0, W, H).data;
          const step = Math.max(6, Math.floor(fontSize / 28));
          for (let y = 0; y < H; y += step) {
            for (let x = 0; x < W; x += step) {
              if (data[(y * W + x) * 4 + 3] > 128) {
                targets.push({ x: x, y: y });
              }
            }
          }
          targets.sort(function (a, b) {
            return a.x - b.x || a.y - b.y;
          });
          for (let i = 0; i < targets.length - 1; i++) {
            if (Math.random() < 0.25) {
              const tmp = targets[i];
              targets[i] = targets[i + 1];
              targets[i + 1] = tmp;
            }
          }
        }

        function buildRibbons() {
          ribbons = [];
          /* Densidade de fitas proporcional à largura */
          const count = Math.min(Math.floor(W / 14), 90);
          for (let i = 0; i < count; i++) {
            ribbons.push({
              x: (i + Math.random() * 0.6) * (W / count),
              w: 6 + Math.random() * 14,
              speed: 0.6 + Math.random() * 1.4,
              phase: Math.random() * Math.PI * 2,
              swayAmp: 2 + Math.random() * 5,
              swaySpeed: 0.0006 + Math.random() * 0.0009,
              alpha: 0.18 + Math.random() * 0.22,
            });
          }
        }

        function buildShimmers() {
          shimmers = [];
          const count = Math.min(Math.floor(W / 110), 10);
          for (let i = 0; i < count; i++) {
            shimmers.push({
              x: Math.random() * W,
              y: Math.random() * cascadeBottom,
              len: 60 + Math.random() * 100,
              speed: 1.4 + Math.random() * 1.8,
              alpha: 0.22 + Math.random() * 0.28,
            });
          }
        }

        function spawnStreams() {
          if (targetIndex >= targets.length) return;
          const burst = 3 + Math.floor(Math.random() * 3);
          for (let i = 0; i < burst && targetIndex < targets.length; i++) {
            const t = targets[targetIndex++];
            streams.push({
              x: t.x + (Math.random() - 0.5) * 18,
              y: lipY - 4,
              spawnY: lipY - 4,
              tx: t.x,
              ty: t.y,
              vy: 1.6 + Math.random() * 1.2,
              w: 2.6 + Math.random() * 1.8,
              r: 4.2 + Math.random() * 1.6,
              fade: 1,
              settled: false,
            });
          }
        }

        function spawnDrip(now) {
          /* Drips constantes do lip — pequenas gotas que caem e somem */
          drips.push({
            x: Math.random() * W,
            y: lipY,
            vy: 1 + Math.random() * 1.4,
            r: 2 + Math.random() * 2,
            life: 1,
            born: now,
          });
        }

        /* ==== LAYERS ==== */

        function drawRibbons(now, c) {
          for (let i = 0; i < ribbons.length; i++) {
            const r = ribbons[i];
            const sway = Math.sin(now * r.swaySpeed + r.phase) * r.swayAmp;
            const x = r.x + sway;
            const grad = ctx.createLinearGradient(x, lipY, x, cascadeBottom);
            grad.addColorStop(0, hexA(c.deep, r.alpha * 0.95));
            grad.addColorStop(0.55, hexA(c.mid, r.alpha * 0.7));
            grad.addColorStop(1, hexA(c.mid, 0));
            ctx.fillStyle = grad;
            ctx.fillRect(x - r.w / 2, lipY, r.w, cascadeBottom - lipY);
          }
        }

        function drawLip(now, c) {
          /* Banda chocolate no topo, com borda inferior ondulada */
          const grad = ctx.createLinearGradient(0, 0, 0, lipY);
          grad.addColorStop(0, c.deep);
          grad.addColorStop(0.55, c.mid);
          grad.addColorStop(1, c.mid);
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(W, 0);
          ctx.lineTo(W, lipY);
          /* Borda inferior com ondas suaves (tipo chocolate derramando) */
          const waveStep = 24;
          for (let x = W; x >= 0; x -= waveStep) {
            const wob = Math.sin(now * 0.0014 + x * 0.018) * 4
                      + Math.sin(now * 0.0008 + x * 0.04) * 2;
            ctx.lineTo(x, lipY + wob);
          }
          ctx.lineTo(0, lipY);
          ctx.closePath();
          ctx.fill();

          /* Highlight superior pro lip parecer brilhante */
          const hg = ctx.createLinearGradient(0, 0, 0, lipY * 0.55);
          hg.addColorStop(0, hexA(c.shine, 0.35));
          hg.addColorStop(1, hexA(c.shine, 0));
          ctx.fillStyle = hg;
          ctx.fillRect(0, 0, W, lipY * 0.55);
        }

        function drawShimmers(now, c) {
          ctx.lineCap = 'round';
          for (let i = 0; i < shimmers.length; i++) {
            const s = shimmers[i];
            s.y += s.speed;
            if (s.y - s.len > cascadeBottom) {
              s.y = -s.len + Math.random() * 40;
              s.x = Math.random() * W;
            }
            const grad = ctx.createLinearGradient(s.x, s.y - s.len, s.x, s.y);
            grad.addColorStop(0, hexA(c.shine, 0));
            grad.addColorStop(0.5, hexA(c.shine, s.alpha * 0.6));
            grad.addColorStop(1, hexA(c.shine, s.alpha));
            ctx.strokeStyle = grad;
            ctx.lineWidth = 1.4;
            ctx.beginPath();
            ctx.moveTo(s.x, s.y - s.len);
            ctx.lineTo(s.x, s.y);
            ctx.stroke();
          }
        }

        function drawSettled(s, c) {
          /* Pool de chocolate brilhante */
          ctx.fillStyle = c.pool;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r * 1.25, 0, Math.PI * 2);
          ctx.fill();
          /* Highlight especular */
          ctx.fillStyle = c.shine;
          ctx.beginPath();
          ctx.arc(s.x - s.r * 0.4, s.y - s.r * 0.5, s.r * 0.4, 0, Math.PI * 2);
          ctx.fill();
        }

        function drawStream(s, c) {
          /* Trail vertical */
          if (s.fade > 0.02) {
            const trailTop = Math.max(s.spawnY, s.y - 260);
            const grad = ctx.createLinearGradient(s.x, trailTop, s.x, s.y);
            const a = s.fade;
            grad.addColorStop(0, hexA(c.mid, 0));
            grad.addColorStop(0.55, hexA(c.mid, a * 0.45));
            grad.addColorStop(1, hexA(c.deep, a * 0.95));
            ctx.strokeStyle = grad;
            ctx.lineWidth = s.w;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(s.x, trailTop);
            ctx.lineTo(s.x, s.y);
            ctx.stroke();
          }
          if (!s.settled) {
            ctx.fillStyle = c.deep;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        function drawDrip(d, c) {
          ctx.fillStyle = hexA(c.mid, d.life * 0.7);
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
          ctx.fill();
        }

        let lastDrip = 0;

        function tick(now) {
          if (!t0) t0 = now;
          const c = colors();
          ctx.clearRect(0, 0, W, H);

          /* Camada 1: ribbons de fundo */
          drawRibbons(now, c);

          /* Camada 2: shimmer de brilho */
          drawShimmers(now, c);

          /* Camada 3: drips constantes do lip */
          if (now - lastDrip > 60) {
            spawnDrip(now);
            lastDrip = now;
          }
          for (let i = drips.length - 1; i >= 0; i--) {
            const d = drips[i];
            d.vy += 0.04;
            d.y += d.vy;
            d.life -= 0.014;
            if (d.life <= 0 || d.y > cascadeBottom) {
              drips.splice(i, 1);
              continue;
            }
            drawDrip(d, c);
          }

          /* Camada 4: streams alvo + assentamento */
          if (now - lastSpawn > 18) {
            spawnStreams();
            lastSpawn = now;
          }
          for (let i = 0; i < settled.length; i++) drawSettled(settled[i], c);
          for (let i = streams.length - 1; i >= 0; i--) {
            const s = streams[i];
            if (!s.settled) {
              s.vy = Math.min(s.vy + 0.04, 6);
              s.y += s.vy;
              if (s.y >= s.ty) {
                s.y = s.ty;
                s.settled = true;
                settled.push({ x: s.tx, y: s.ty, r: s.r });
              }
            } else {
              s.fade -= 0.028;
              if (s.fade <= 0) {
                streams.splice(i, 1);
                continue;
              }
            }
            drawStream(s, c);
          }

          /* Camada 5: lip por cima das ribbons (que saem dele) */
          drawLip(now, c);

          /* Restart 5s após tudo assentar */
          if (
            targetIndex >= targets.length &&
            streams.length === 0 &&
            !restartTimer
          ) {
            restartTimer = setTimeout(function () {
              settled = [];
              targetIndex = 0;
              restartTimer = null;
            }, 5000);
          }

          requestAnimationFrame(tick);
        }

        function start() {
          resize();
          requestAnimationFrame(tick);
        }

        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(start);
        } else {
          setTimeout(start, 250);
        }

        let resizeTimer;
        window.addEventListener('resize', function () {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(resize, 200);
        });
      })();

    </script>

      (function () {
        try {
          var saved = localStorage.getItem('rosa-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));

    <style>

        --rosa-suave: #fbd5dd;
        --rosa-medio: #f7c6d3;
        --rosa-vivo: #d6336c;

        --choco: #4a2418;
        --creme: #fffaf7;
        --cinza-500: #8a7479;
        --cinza-700: #4a3a3d;
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
      }
      [data-theme="dark"] {
        --rosa-claro: #221a1d;
        --rosa-suave: #3a2429;
        --rosa-medio: #4a2c33;
        --choco: #fff7f3;
        --creme: #161013;
        --cinza-500: #a99499;
        --cinza-700: #e9dde0;
      }
      html { color-scheme: light; }
      html[data-theme="dark"] { color-scheme: dark; }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
        background: linear-gradient(180deg, var(--rosa-claro) 0%, var(--creme) 100%);
        color: var(--cinza-700);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem 1.5rem;
        overflow: hidden;
        position: relative;
        line-height: 1.7;
      }
      body::before,
      body::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.55;
        pointer-events: none;
        animation: float 18s ease-in-out infinite;
      }
      body::before {
        width: 380px;
        height: 380px;
        background: var(--rosa-medio);
        top: -100px;
        left: -80px;
      }
      body::after {
        width: 460px;
        height: 460px;
        background: var(--rosa-suave);
        bottom: -140px;
        right: -120px;
        animation-delay: -7s;

      @keyframes float {

      .code {

  <body>
    <canvas id="chocoCanvas" aria-hidden="true"></canvas>

    <main class="wrap">
      <noscript>
        <div class="code-fallback" aria-hidden="true">404</div>
      </noscript>

      <span class="eyebrow">Ops, doce engano</span>
      <h1>Essa página <em>derreteu no caminho</em>.</h1>
      <p class="lead">O endereço que você buscava não existe ou foi movido para outro lugar. Mas calma: as trufas continuam aqui, perfeitinhas.</p>

      <div class="actions">
        <a href="/" class="btn btn--primary"> ← Voltar para o início </a>
        <a href="/#produtos" class="btn btn--ghost"> Ver os sabores </a>
      </div>

      <nav class="quick" aria-label="Atalhos">
        <p>Talvez você queira</p>
        <ul>
          <li><a href="/#encomendas">Encomendas</a></li>
          <li><a href="/#contato">Contato</a></li>
          <li><a href="https://wa.me/5531986977393" target="_blank" rel="noopener">WhatsApp</a></li>
        </ul>
      </nav>
    </main>

    <script>
      /* Chocolate escorrendo: streams verticais de chocolate fluem do
         topo, deixando rastro, e se assentam formando '404' */
      (function () {
        const canvas = document.getElementById('chocoCanvas');
        if (!canvas || !canvas.getContext) return;
        const ctx = canvas.getContext('2d');
        const dpr = Math.min(window.devicePixelRatio || 1, 2);

        let W = 0, H = 0;
        let targets = [];
        let streams = [];
        let settled = [];
        let targetIndex = 0;
        let lastSpawn = 0;
        let restartTimer = null;

        function colors() {
          const dark = document.documentElement.getAttribute('data-theme') === 'dark';
          return dark
            ? { dark: '#8a4631', light: '#b86b50' }
            : { dark: '#3d1c12', light: '#6b3525' };
        }

        function resize() {
          W = window.innerWidth;
          H = window.innerHeight;
          canvas.width = W * dpr;
          canvas.height = H * dpr;
          canvas.style.width = W + 'px';
          canvas.style.height = H + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          computeTargets();
          streams = [];
          settled = [];
          targetIndex = 0;
        }

        function computeTargets() {
          targets = [];
          const fontSize = Math.min(W * 0.32, H * 0.45, 320);
          const centerY = Math.min(H * 0.3, 230);

          const off = document.createElement('canvas');
          off.width = W;
          off.height = H;
          const octx = off.getContext('2d');
          octx.fillStyle = '#000';
          octx.font = '700 ' + fontSize + 'px "Playfair Display", Georgia, serif';
          octx.textAlign = 'center';
          octx.textBaseline = 'middle';
          octx.fillText('404', W / 2, centerY);

          const data = octx.getImageData(0, 0, W, H).data;
          const step = Math.max(6, Math.floor(fontSize / 28));
          for (let y = 0; y < H; y += step) {
            for (let x = 0; x < W; x += step) {
              if (data[(y * W + x) * 4 + 3] > 128) {
                targets.push({ x: x, y: y });
              }
            }
          }
          /* Ordenar por x para que streams adjacentes caiam quase juntas
             — visualmente parece chocolate escorrendo de cima */
          targets.sort(function (a, b) {
            return a.x - b.x || a.y - b.y;
          });
          /* Pequeno embaralhamento local pra não ficar mecânico */
          for (let i = 0; i < targets.length - 1; i++) {
            if (Math.random() < 0.25) {
              const tmp = targets[i];
              targets[i] = targets[i + 1];
              targets[i + 1] = tmp;
            }
          }
        }

        function spawnStream() {
          if (targetIndex >= targets.length) return;
          /* Spawn 2-3 streams por frame pra acelerar */
          const burst = 2 + Math.floor(Math.random() * 2);
          for (let i = 0; i < burst && targetIndex < targets.length; i++) {
            const t = targets[targetIndex++];
            streams.push({
              x: t.x + (Math.random() - 0.5) * 14,
              y: -10,
              spawnY: -10,
              tx: t.x,
              ty: t.y,
              vy: 1.4 + Math.random() * 1.0,
              w: 2.2 + Math.random() * 1.6,
              r: 3.8 + Math.random() * 1.6,
              fade: 1, /* opacidade do trail; cai pra 0 após assentar */
              settled: false,
            });
          }
        }

        function drawSettled(s, c) {
          ctx.fillStyle = c.dark;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r * 1.2, 0, Math.PI * 2);
          ctx.fill();
          /* highlight especular leve pra parecer chocolate brilhante */
          ctx.fillStyle = c.light;
          ctx.beginPath();
          ctx.arc(s.x - s.r * 0.35, s.y - s.r * 0.45, s.r * 0.45, 0, Math.PI * 2);
          ctx.fill();
        }

        function drawStream(s, c) {
          /* Trail: linha vertical do spawnY até y atual, com gradient
             que fica mais opaco perto da gota e some no topo */
          if (s.fade > 0.02) {
            const trailTop = Math.max(s.spawnY, s.y - 220);
            const grad = ctx.createLinearGradient(s.x, trailTop, s.x, s.y);
            const a = s.fade;
            grad.addColorStop(0, hexA(c.dark, 0));
            grad.addColorStop(0.6, hexA(c.dark, a * 0.35));
            grad.addColorStop(1, hexA(c.dark, a * 0.85));
            ctx.strokeStyle = grad;
            ctx.lineWidth = s.w;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(s.x, trailTop);
            ctx.lineTo(s.x, s.y);
            ctx.stroke();
          }
          if (!s.settled) {
            /* Cabeça em queda: gota arredondada */
            ctx.fillStyle = c.dark;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        function hexA(hex, alpha) {
          const v = parseInt(hex.slice(1), 16);
          return 'rgba(' + (v >> 16 & 255) + ',' + (v >> 8 & 255) + ',' + (v & 255) + ',' + alpha + ')';
        }

        function tick(now) {
          ctx.clearRect(0, 0, W, H);
          const c = colors();

          if (now - lastSpawn > 22) {
            spawnStream();
            lastSpawn = now;
          }

          for (let i = 0; i < settled.length; i++) drawSettled(settled[i], c);

          for (let i = streams.length - 1; i >= 0; i--) {
            const s = streams[i];
            if (!s.settled) {
              s.vy = Math.min(s.vy + 0.025, 4.5);
              s.y += s.vy;
              if (s.y >= s.ty) {
                s.y = s.ty;
                s.settled = true;
                settled.push({ x: s.tx, y: s.ty, r: s.r });
              }
            } else {
              /* Trail vai derretendo após assentamento */
              s.fade -= 0.025;
              if (s.fade <= 0) {
                streams.splice(i, 1);
                continue;
              }
            }
            drawStream(s, c);
          }

          /* Reinicia 5s depois que tudo se assentou e os trails sumiram */
          if (
            targetIndex >= targets.length &&
            streams.length === 0 &&
            !restartTimer
          ) {
            restartTimer = setTimeout(function () {
              settled = [];
              targetIndex = 0;
              restartTimer = null;
            }, 5000);
          }

          requestAnimationFrame(tick);
        }

        function start() {
          resize();
          requestAnimationFrame(tick);
        }

        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(start);
        } else {
          setTimeout(start, 250);
        }

        let resizeTimer;
        window.addEventListener('resize', function () {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(resize, 200);
        });
      })();

    </script>
  </body>

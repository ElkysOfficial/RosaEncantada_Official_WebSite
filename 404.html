<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <title>Página não encontrada, Rosa Encantada by Lorraine</title>
    <meta name="description" content="A página que você procurava não existe ou foi movida. Volte ao início e descubra nossas trufas artesanais." />
    <meta name="theme-color" content="#d6336c" />

    <link rel="canonical" href="https://green-hippopotamus-490496.hostingersite.com/" />
    <link rel="icon" type="image/png" href="assets/img/logo.png" />

    <script>
      (function () {
        try {
          var saved = localStorage.getItem('rosa-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --rosa-claro: #fdeef2;
        --rosa-suave: #fbd5dd;
        --rosa-medio: #f7c6d3;
        --rosa-vivo: #d6336c;
        --rosa-deep: #b1264e;
        --choco: #4a2418;
        --creme: #fffaf7;
        --cinza-500: #8a7479;
        --cinza-700: #4a3a3d;
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
      }
      [data-theme="dark"] {
        --rosa-claro: #221a1d;
        --rosa-suave: #3a2429;
        --rosa-medio: #4a2c33;
        --choco: #fff7f3;
        --creme: #161013;
        --cinza-500: #a99499;
        --cinza-700: #e9dde0;
      }
      html { color-scheme: light; }
      html[data-theme="dark"] { color-scheme: dark; }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
        background: linear-gradient(180deg, var(--rosa-claro) 0%, var(--creme) 100%);
        color: var(--cinza-700);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem 1.5rem;
        overflow: hidden;
        position: relative;
        line-height: 1.7;
      }
      body::before,
      body::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.55;
        pointer-events: none;
        animation: float 18s ease-in-out infinite;
      }
      body::before {
        width: 380px;
        height: 380px;
        background: var(--rosa-medio);
        top: -100px;
        left: -80px;
      }
      body::after {
        width: 460px;
        height: 460px;
        background: var(--rosa-suave);
        bottom: -140px;
        right: -120px;
        animation-delay: -7s;
      }
      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(30px, -40px) scale(1.05);
        }
      }

      #chocoCanvas {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
      .code-fallback {
        font-family: "Playfair Display", serif;
        font-size: clamp(7rem, 22vw, 12rem);
        font-weight: 700;
        color: var(--choco);
        letter-spacing: -0.04em;
        line-height: 1;
        margin-bottom: 1.5rem;
      }
      .wrap {
        position: relative;
        z-index: 2;
        max-width: 640px;
        text-align: center;
        animation: rise 0.9s var(--ease);
        padding-top: clamp(180px, 38vh, 360px);
      }
      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid var(--rosa-suave);
        box-shadow: 0 12px 28px rgba(74, 36, 24, 0.12);
        margin: 0 auto 2rem;
        animation: bob 5s ease-in-out infinite;
      }
      @keyframes bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .code {
        font-family: "Playfair Display", serif;
        font-size: clamp(7rem, 22vw, 12rem);
        font-weight: 700;
        line-height: 1;
        color: var(--choco);
        letter-spacing: -0.04em;
        position: relative;
        display: inline-block;
      }
      .code .zero {
        display: inline-block;
        color: var(--rosa-vivo);
        animation: spin 8s linear infinite;
        transform-origin: 50% 55%;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .eyebrow {
        font-family: "Dancing Script", cursive;
        font-size: 1.4rem;
        color: var(--rosa-vivo);
        margin: 1rem 0 0.5rem;
      }

      h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        color: var(--choco);
        letter-spacing: -0.02em;
        margin: 0 0 1rem;
        line-height: 1.2;
      }
      h1 em {
        font-family: "Dancing Script", cursive;
        font-style: normal;
        color: var(--rosa-vivo);
      }

      .lead {
        font-size: 1.05rem;
        max-width: 500px;
        margin: 0 auto 2.2rem;
        color: var(--cinza-500);
      }

      .actions {
        display: flex;
        gap: 0.85rem;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 3rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.95rem 1.8rem;
        border-radius: 999px;
        font-weight: 500;
        font-size: 0.95rem;
        transition: all 0.25s var(--ease);
        text-decoration: none;
        border: 1.5px solid transparent;
      }
      .btn--primary {
        background: linear-gradient(135deg, var(--rosa-vivo), var(--rosa-deep));
        color: #fff;
        box-shadow: 0 14px 30px rgba(214, 51, 108, 0.28);
      }
      .btn--primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 18px 36px rgba(74, 36, 24, 0.25);
        background: var(--choco);
      }
      .btn--ghost {
        color: var(--choco);
        border-color: var(--choco);
      }
      .btn--ghost:hover {
        background: var(--choco);
        color: #fff;
      }

      .quick {
        padding-top: 2rem;
        border-top: 1px solid rgba(214, 51, 108, 0.15);
      }
      .quick p {
        font-size: 0.85rem;
        color: var(--cinza-500);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 1rem;
      }
      .quick ul {
        list-style: none;
        display: flex;
        gap: 1.5rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .quick a {
        color: var(--choco);
        font-weight: 500;
        font-size: 0.95rem;
        text-decoration: none;
        position: relative;
        padding-bottom: 2px;
        transition: color 0.25s var(--ease);
      }
      .quick a::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 1.5px;
        background: var(--rosa-vivo);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.3s var(--ease);
      }
      .quick a:hover {
        color: var(--rosa-vivo);
      }
      .quick a:hover::after {
        transform: scaleX(1);
      }

      @media (max-width: 480px) {
        .actions {
          flex-direction: column;
          align-items: stretch;
        }
        .btn {
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="chocoCanvas" aria-hidden="true"></canvas>

    <main class="wrap">
      <noscript>
        <div class="code-fallback" aria-hidden="true">404</div>
      </noscript>

      <span class="eyebrow">Ops, doce engano</span>
      <h1>Essa página <em>derreteu no caminho</em>.</h1>
      <p class="lead">O endereço que você buscava não existe ou foi movido para outro lugar. Mas calma: as trufas continuam aqui, perfeitinhas.</p>

      <div class="actions">
        <a href="/" class="btn btn--primary"> ← Voltar para o início </a>
        <a href="/#produtos" class="btn btn--ghost"> Ver os sabores </a>
      </div>

      <nav class="quick" aria-label="Atalhos">
        <p>Talvez você queira</p>
        <ul>
          <li><a href="/#encomendas">Encomendas</a></li>
          <li><a href="/#contato">Contato</a></li>
          <li><a href="https://wa.me/5531986977393" target="_blank" rel="noopener">WhatsApp</a></li>
        </ul>
      </nav>
    </main>

    <script>
      /* Chuva lenta de gotas de chocolate que se acumulam formando 404 */
      (function () {
        const canvas = document.getElementById('chocoCanvas');
        if (!canvas || !canvas.getContext) return;
        const ctx = canvas.getContext('2d');
        const dpr = Math.min(window.devicePixelRatio || 1, 2);

        let W = 0, H = 0;
        let targets = [];
        let drops = [];
        let settled = [];
        let targetIndex = 0;
        let lastSpawn = 0;
        let restartTimer = null;

        function chocolateColor() {
          return document.documentElement.getAttribute('data-theme') === 'dark'
            ? '#7a3e2a'
            : '#4a2418';
        }

        function resize() {
          W = window.innerWidth;
          H = window.innerHeight;
          canvas.width = W * dpr;
          canvas.height = H * dpr;
          canvas.style.width = W + 'px';
          canvas.style.height = H + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          computeTargets();
          drops = [];
          settled = [];
          targetIndex = 0;
        }

        function computeTargets() {
          targets = [];
          const fontSize = Math.min(W * 0.32, H * 0.45, 320);
          const centerY = Math.min(H * 0.28, 220);

          const off = document.createElement('canvas');
          off.width = W;
          off.height = H;
          const octx = off.getContext('2d');
          octx.fillStyle = '#000';
          octx.font = '700 ' + fontSize + 'px "Playfair Display", Georgia, serif';
          octx.textAlign = 'center';
          octx.textBaseline = 'middle';
          octx.fillText('404', W / 2, centerY);

          const data = octx.getImageData(0, 0, W, H).data;
          const step = Math.max(7, Math.floor(fontSize / 26));
          for (let y = 0; y < H; y += step) {
            for (let x = 0; x < W; x += step) {
              if (data[(y * W + x) * 4 + 3] > 128) {
                targets.push({ x: x, y: y });
              }
            }
          }
          /* shuffle para preenchimento orgânico */
          for (let i = targets.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = targets[i];
            targets[i] = targets[j];
            targets[j] = tmp;
          }
        }

        function spawnDrop() {
          if (targetIndex >= targets.length) return;
          const t = targets[targetIndex++];
          drops.push({
            x: t.x + (Math.random() - 0.5) * 80,
            y: -20 - Math.random() * 120,
            tx: t.x,
            ty: t.y,
            vy: 0.35 + Math.random() * 0.35,
            r: 3.5 + Math.random() * 1.8,
          });
        }

        function drawSettled(s) {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r * 1.15, 0, Math.PI * 2);
          ctx.fill();
        }

        function drawTeardrop(d) {
          ctx.beginPath();
          ctx.moveTo(d.x, d.y - d.r * 1.6);
          ctx.bezierCurveTo(
            d.x + d.r * 1.05, d.y - d.r * 0.5,
            d.x + d.r * 1.05, d.y + d.r,
            d.x, d.y + d.r * 1.4
          );
          ctx.bezierCurveTo(
            d.x - d.r * 1.05, d.y + d.r,
            d.x - d.r * 1.05, d.y - d.r * 0.5,
            d.x, d.y - d.r * 1.6
          );
          ctx.fill();
        }

        function tick(now) {
          ctx.clearRect(0, 0, W, H);
          ctx.fillStyle = chocolateColor();

          if (now - lastSpawn > 38) {
            spawnDrop();
            lastSpawn = now;
          }

          for (let i = 0; i < settled.length; i++) drawSettled(settled[i]);

          for (let i = drops.length - 1; i >= 0; i--) {
            const d = drops[i];
            d.vy = Math.min(d.vy + 0.004, 1.1);
            d.y += d.vy;
            d.x += (d.tx - d.x) * 0.018;
            drawTeardrop(d);
            if (d.y >= d.ty) {
              settled.push({ x: d.tx, y: d.ty, r: d.r });
              drops.splice(i, 1);
            }
          }

          /* Quando tudo assentou, agenda restart depois de 8s */
          if (
            targetIndex >= targets.length &&
            drops.length === 0 &&
            !restartTimer
          ) {
            restartTimer = setTimeout(function () {
              settled = [];
              targetIndex = 0;
              restartTimer = null;
            }, 8000);
          }

          requestAnimationFrame(tick);
        }

        function start() {
          resize();
          requestAnimationFrame(tick);
        }

        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(start);
        } else {
          setTimeout(start, 250);
        }

        let resizeTimer;
        window.addEventListener('resize', function () {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(resize, 200);
        });
      })();

    </script>
  </body>
</html>

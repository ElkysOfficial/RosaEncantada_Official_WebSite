<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdeef2"/>
      <stop offset="55%" stop-color="#fbd5dd"/>
      <stop offset="100%" stop-color="#f7c6d3"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d6336c"/>
      <stop offset="100%" stop-color="#b1264e"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#4a2418" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Blobs decorativos -->
  <circle cx="120" cy="120" r="220" fill="#f7c6d3" opacity="0.6" filter="url(#soft)"/>
  <circle cx="1080" cy="540" r="280" fill="#fbd5dd" opacity="0.7" filter="url(#soft)"/>
  <circle cx="900" cy="120" r="160" fill="#ffe9c2" opacity="0.45" filter="url(#soft)"/>

  <!-- Glow central -->
  <ellipse cx="900" cy="315" rx="380" ry="380" fill="url(#glow)"/>

  <!-- Borda decorativa -->
  <rect x="40" y="40" width="1120" height="550" rx="32" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Conteúdo lado esquerdo -->
  <g transform="translate(90, 130)">
    <!-- Eyebrow -->
    <line x1="0" y1="20" x2="40" y2="20" stroke="#d6336c" stroke-width="2.5" stroke-linecap="round"/>
    <text x="56" y="28" font-family="'Dancing Script', cursive" font-size="32" fill="#d6336c" font-weight="700">
      Trufas &amp; bombons artesanais
    </text>

    <!-- Título -->
    <text x="0" y="115" font-family="'Playfair Display', Georgia, serif" font-size="78" font-weight="700" fill="#4a2418" letter-spacing="-2">
      Pequenos
    </text>
    <text x="0" y="200" font-family="'Dancing Script', cursive" font-size="98" font-weight="700" fill="#d6336c">
      encantos
    </text>
    <text x="0" y="285" font-family="'Playfair Display', Georgia, serif" font-size="78" font-weight="700" fill="#4a2418" letter-spacing="-2">
      de chocolate.
    </text>

    <!-- Subtítulo -->
    <text x="0" y="345" font-family="'Inter', sans-serif" font-size="24" fill="#6b3525" font-weight="400">
      Feitos à mão, com chocolate belga e capricho
    </text>
    <text x="0" y="378" font-family="'Inter', sans-serif" font-size="24" fill="#6b3525" font-weight="400">
      em cada detalhe.
    </text>

    <!-- CTA pill -->
    <g transform="translate(0, 415)" filter="url(#shadow)">
      <rect x="0" y="0" width="280" height="62" rx="31" fill="url(#cta)"/>
      <text x="140" y="40" text-anchor="middle" font-family="'Inter', sans-serif" font-size="20" font-weight="500" fill="#ffffff">
        rosaencantada.com.br
      </text>
    </g>
  </g>

  <!-- Lado direito: círculo decorativo com mascote/símbolo -->
  <g transform="translate(870, 145)">
    <!-- Frame circular -->
    <circle cx="170" cy="170" r="180" fill="#ffffff" opacity="0.4"/>
    <circle cx="170" cy="170" r="155" fill="#ffffff" opacity="0.7" filter="url(#shadow)"/>

    <!-- Trufa estilizada -->
    <g transform="translate(170, 170)">
      <!-- Sombra base -->
      <ellipse cx="0" cy="80" rx="100" ry="14" fill="#4a2418" opacity="0.18"/>
      <!-- Trufa -->
      <circle cx="0" cy="0" r="95" fill="#4a2418"/>
      <circle cx="-25" cy="-25" r="35" fill="#6b3525" opacity="0.6"/>
      <circle cx="-15" cy="-35" r="14" fill="#ffffff" opacity="0.4"/>
      <!-- Detalhe rosa por cima -->
      <circle cx="35" cy="-50" r="22" fill="#d6336c"/>
      <circle cx="40" cy="-55" r="6" fill="#ffffff" opacity="0.5"/>
      <!-- Polvilhos -->
      <circle cx="-40" cy="20" r="3" fill="#fbd5dd"/>
      <circle cx="20" cy="35" r="3" fill="#fbd5dd"/>
      <circle cx="50" cy="10" r="3" fill="#fbd5dd"/>
      <circle cx="-15" cy="50" r="3" fill="#fbd5dd"/>
    </g>
  </g>

  <!-- Selo "5.0 ★" -->
  <g transform="translate(1010, 90)">
    <circle cx="0" cy="0" r="60" fill="#4a2418" filter="url(#shadow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="'Playfair Display', serif" font-size="26" font-weight="700" fill="#ffffff">★ 5,0</text>
    <text x="0" y="22" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#fbd5dd" letter-spacing="2">CLIENTES</text>
  </g>

  <!-- Rodapé branding -->
  <g transform="translate(90, 540)">
    <circle cx="22" cy="22" r="22" fill="#d6336c"/>
    <text x="22" y="29" text-anchor="middle" font-family="'Dancing Script', cursive" font-size="24" font-weight="700" fill="#ffffff">R</text>
    <text x="58" y="20" font-family="'Playfair Display', serif" font-size="22" font-weight="700" fill="#4a2418">Rosa Encantada</text>
    <text x="58" y="42" font-family="'Dancing Script', cursive" font-size="20" fill="#d6336c">by Lorraine</text>
  </g>
</svg>

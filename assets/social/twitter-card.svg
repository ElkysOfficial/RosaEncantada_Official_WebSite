<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdeef2"/>
      <stop offset="100%" stop-color="#f7c6d3"/>
    </linearGradient>
    <linearGradient id="cta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d6336c"/>
      <stop offset="100%" stop-color="#b1264e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#4a2418" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Blobs -->
  <circle cx="100" cy="540" r="240" fill="#fbd5dd" opacity="0.7" filter="url(#soft)"/>
  <circle cx="1100" cy="80" r="200" fill="#f7c6d3" opacity="0.6" filter="url(#soft)"/>
  <circle cx="850" cy="500" r="180" fill="#ffe9c2" opacity="0.5" filter="url(#soft)"/>

  <ellipse cx="900" cy="300" rx="340" ry="340" fill="url(#glow)"/>

  <!-- Borda -->
  <rect x="40" y="40" width="1120" height="520" rx="32" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.55"/>

  <!-- Conteúdo -->
  <g transform="translate(90, 120)">
    <line x1="0" y1="20" x2="40" y2="20" stroke="#d6336c" stroke-width="2.5" stroke-linecap="round"/>
    <text x="56" y="28" font-family="'Dancing Script', cursive" font-size="30" fill="#d6336c" font-weight="700">
      Trufas artesanais
    </text>

    <text x="0" y="115" font-family="'Playfair Display', serif" font-size="72" font-weight="700" fill="#4a2418" letter-spacing="-2">
      Doce é detalhe.
    </text>
    <text x="0" y="195" font-family="'Dancing Script', cursive" font-size="86" font-weight="700" fill="#d6336c">
      Detalhe é afeto.
    </text>

    <text x="0" y="265" font-family="'Inter', sans-serif" font-size="22" fill="#6b3525">
      Trufas e bombons feitos à mão com chocolate belga.
    </text>
    <text x="0" y="298" font-family="'Inter', sans-serif" font-size="22" fill="#6b3525">
      Pequenos encantos para grandes momentos.
    </text>

    <!-- Chips -->
    <g transform="translate(0, 335)" font-family="'Inter', sans-serif" font-size="16" fill="#6b3525">
      <g>
        <rect x="0" y="0" width="160" height="40" rx="20" fill="#ffffff" stroke="#fbd5dd" stroke-width="1"/>
        <circle cx="20" cy="20" r="4" fill="#d6336c"/>
        <text x="34" y="25">100% artesanal</text>
      </g>
      <g transform="translate(175, 0)">
        <rect x="0" y="0" width="180" height="40" rx="20" fill="#ffffff" stroke="#fbd5dd" stroke-width="1"/>
        <circle cx="20" cy="20" r="4" fill="#d6336c"/>
        <text x="34" y="25">Chocolate belga</text>
      </g>
      <g transform="translate(370, 0)">
        <rect x="0" y="0" width="200" height="40" rx="20" fill="#ffffff" stroke="#fbd5dd" stroke-width="1"/>
        <circle cx="20" cy="20" r="4" fill="#d6336c"/>
        <text x="34" y="25">Caixa para presente</text>
      </g>
    </g>

    <g transform="translate(0, 405)" filter="url(#shadow)">
      <rect x="0" y="0" width="300" height="58" rx="29" fill="url(#cta)"/>
      <text x="150" y="38" text-anchor="middle" font-family="'Inter', sans-serif" font-size="19" font-weight="500" fill="#ffffff">
        Peça pelo WhatsApp →
      </text>
    </g>
  </g>

  <!-- Trufa decorativa -->
  <g transform="translate(900, 280)">
    <circle cx="0" cy="0" r="160" fill="#ffffff" opacity="0.4"/>
    <circle cx="0" cy="0" r="135" fill="#ffffff" opacity="0.7" filter="url(#shadow)"/>
    <g>
      <ellipse cx="0" cy="70" rx="85" ry="12" fill="#4a2418" opacity="0.15"/>
      <circle cx="0" cy="0" r="80" fill="#4a2418"/>
      <circle cx="-22" cy="-22" r="28" fill="#6b3525" opacity="0.6"/>
      <circle cx="-12" cy="-30" r="12" fill="#ffffff" opacity="0.4"/>
      <circle cx="30" cy="-42" r="18" fill="#d6336c"/>
      <circle cx="34" cy="-46" r="5" fill="#ffffff" opacity="0.5"/>
      <circle cx="-32" cy="18" r="2.5" fill="#fbd5dd"/>
      <circle cx="18" cy="30" r="2.5" fill="#fbd5dd"/>
      <circle cx="42" cy="8" r="2.5" fill="#fbd5dd"/>
    </g>
  </g>

  <!-- Branding rodapé -->
  <g transform="translate(90, 510)">
    <circle cx="22" cy="22" r="22" fill="#d6336c"/>
    <text x="22" y="29" text-anchor="middle" font-family="'Dancing Script', cursive" font-size="24" font-weight="700" fill="#ffffff">R</text>
    <text x="58" y="20" font-family="'Playfair Display', serif" font-size="20" font-weight="700" fill="#4a2418">Rosa Encantada</text>
    <text x="58" y="40" font-family="'Dancing Script', cursive" font-size="18" fill="#d6336c">by Lorraine · rosaencantada.com.br</text>
  </g>
</svg>
